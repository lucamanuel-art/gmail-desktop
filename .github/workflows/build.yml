name: Build (no publish)

# Manually-triggered Windows build that produces the installer as a downloadable
# artifact WITHOUT publishing a GitHub release — for test installs before a real
# release. Run it from the Actions tab (or `gh workflow run build.yml`).
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm ci

      - name: Install renderer dependencies
        run: npm ci --prefix renderer

      - name: Build installer (no publish)
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: gmail-desktop-windows
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          if-no-files-found: error
