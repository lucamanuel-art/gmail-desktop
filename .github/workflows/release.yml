name: Release

# Build the Windows installer on a Windows runner and publish a GitHub release
# (installer + latest.yml for electron-updater) whenever a v* tag is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm ci

      - name: Install renderer dependencies
        run: npm ci --prefix renderer

      - name: Build and publish release
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
