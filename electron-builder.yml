appId: com.gmaildesktop.app
productName: Gmail Desktop
directories:
  output: dist
files:
  - dist-electron/**/*
  - renderer/out/**/*
  - assets/**/*
  - package.json
  - CHANGELOG.md
publish:
  provider: github
  owner: lucamanuel-art
  repo: gmail-desktop
  releaseType: release
linux:
  target:
    - AppImage
    - deb
  category: Network
  icon: build/icon.png
win:
  target:
    - nsis
  icon: build/icon.png
mac:
  target:
    - dmg
  category: public.app-category.productivity
  icon: build/icon.png
